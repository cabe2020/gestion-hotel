version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
      - 'npm'
    commit-message:
      prefix: 'chore(deps):'
    groups:
      development-dependencies:
        patterns:
          - '@types/*'
          - 'eslint*'
          - 'prettier*'
          - 'vitest*'
          - 'typescript*'
          - '@vitejs/*'
      production-dependencies:
        patterns:
          - 'next*'
          - 'react*'
          - 'prisma*'
          - '@prisma/*'
          - 'bcryptjs'
          - 'zod'
          - 'lucide-react'
          - 'recharts'
          - 'nodemailer'
          - 'resend'
          - 'jspdf*'
          - 'clsx'
          - 'pg'